<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Nicbytes</title>
  <meta name="description" content="Projects by Nicbytes." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dot-ping.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js" defer></script>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>
  <div class="orb orb-c" aria-hidden="true"></div>

  <video class="background-video" autoplay muted loop playsinline poster="">
    <source src="background.mp4" type="video/mp4" />
  </video>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Nicbytes home">
      <span class="brand-mark">N</span>
      <span class="brand-text">Nicbytes</span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation" aria-expanded="false">☰</button>
    <nav id="site-nav" aria-label="Main navigation">
      <a class="" href="index.html">Home</a>
      <a class="active" href="projects.html">Projects</a>
      <a class="" href="ideas.html">Ideas</a>
      <a class="" href="about.html">About</a>
      <a class="" href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
  <section class="page-hero reveal">
    <p class="eyebrow"><span></span>Projects</p>
    <h1>Projects I can change anytime.</h1>
  </section>

  <section class="section reveal delay-1">
    <div class="project-list" id="projects-list" data-source="content/projects.json"></div>
  </section>

  </main>

  <aside class="music-player" aria-label="Background music player">
    <canvas id="music-visualizer" class="music-visualizer" aria-hidden="true"></canvas>
    <div class="music-shell">
      <div class="music-cover" aria-hidden="true">
        <img id="track-cover" alt="" />
        <span id="track-cover-fallback">♪</span>
      </div>
      <div class="music-body">
        <div class="music-head">
          <span class="equal-dot" aria-hidden="true"></span>
          <span>Now playing</span>
        </div>
        <div class="music-title" id="track-title">Loading music…</div>
        <div class="music-artist" id="track-meta">Background track</div>
        <div class="music-progress">
          <input id="music-progress" type="range" min="0" max="100" value="0" />
          <div class="music-time">
            <span id="music-current">0:00</span>
            <span id="music-duration">0:00</span>
          </div>
        </div>
        <div class="music-controls">
          <button id="music-prev" aria-label="Previous song" title="Previous">⏮</button>
          <button id="music-play" class="play" aria-label="Play or pause" title="Play/Pause">▶</button>
          <button id="music-next" aria-label="Next song" title="Next">⏭</button>
        </div>
        <div class="music-row" aria-label="Volume">
          <span>Vol</span>
          <input id="music-volume" type="range" min="0" max="1" step="0.05" value="0.05" />
        </div>
      </div>
    </div>
  </aside>

  <script src="script.js" defer></script>
  
</body>
</html>
